name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Setup CocoaPods cache
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS (unsigned IPA)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace KelimeAvi.xcworkspace \
            -scheme KelimeAvi \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ github.workspace }}/build/KelimeAvi.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r build/KelimeAvi.xcarchive/Products/Applications/KelimeAvi.app build/Payload/
          cd build
          zip -r KelimeAvi-unsigned.ipa Payload
          ls -la KelimeAvi-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: KelimeAvi-iOS
          path: build/KelimeAvi-unsigned.ipa
          retention-days: 30

      - name: Build iOS Simulator
        working-directory: ios
        run: |
          xcodebuild \
            -workspace KelimeAvi.xcworkspace \
            -scheme KelimeAvi \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath ${{ github.workspace }}/build/simulator \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: KelimeAvi-iOS-Simulator
          path: build/simulator/Build/Products/Release-iphonesimulator/KelimeAvi.app
          retention-days: 30
