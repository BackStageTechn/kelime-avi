name: iOS Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli@latest @expo/cli@latest

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS Archive (unsigned)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace KelimeAvi.xcworkspace \
            -scheme KelimeAvi \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ github.workspace }}/build/KelimeAvi.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/KelimeAvi.xcarchive/Products/Applications/KelimeAvi.app build/Payload/
          cd build
          zip -r KelimeAvi-unsigned.ipa Payload
          echo "IPA size: $(du -h KelimeAvi-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: KelimeAvi-iOS-IPA
          path: build/KelimeAvi-unsigned.ipa
          retention-days: 90
